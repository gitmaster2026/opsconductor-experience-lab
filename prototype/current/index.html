<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpsConductor Experience Lab V4</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="brand">OpsConductor <span>Experience Lab V4</span></div>
      <div class="control-group">
        <button id="lensUniverse" class="active">Universe</button>
        <button id="lensRisk">Risk Board</button>
      </div>
      <div class="control-group">
        <button id="panelDashboard" class="active">Dashboard</button>
        <button id="panelPassport">Passport</button>
      </div>
      <div class="spacer"></div>
      <label>Zoom <input id="zoom" type="range" min="60" max="240" value="100" /></label>
      <label>Time <input id="time" type="range" min="0" max="3" value="3" step="1" /></label>
      <div id="timeLabel" class="time-label">Current state</div>
    </header>

    <main class="layout">
      <aside id="leftPanel" class="panel left-panel"></aside>
      <section class="workspace">
        <canvas id="universeCanvas"></canvas>
        <div id="riskBoard" class="risk-board hidden"></div>
      </section>
      <aside id="jarvisPanel" class="panel jarvis-panel"></aside>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
