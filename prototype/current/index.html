<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpsConductor Experience Lab V4</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="shared-investigation-state.css" />
  <link rel="stylesheet" href="operational-visual-grammar.css" />
  <link rel="stylesheet" href="panels/functional-radar-workspace.css" />
  <link rel="stylesheet" href="risk-board-recursion.css" />
  <link rel="stylesheet" href="panels/visual-layers.css" />
  <link rel="stylesheet" href="panels/guided-investigation.css" />
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="brand">OpsConductor <span>Experience Lab V4</span></div>
      <div class="control-group" role="group" aria-label="Primary workspace">
        <button id="lensRisk" class="active">Risk Board</button>
      </div>
      <div class="control-group" role="group" aria-label="Left panel">
        <button id="panelDashboard" class="active">Dashboard</button>
        <button id="panelPassport">Passport</button>
      </div>
      <span class="lens-group-label">Investigate</span>
      <div class="control-group" role="group" aria-label="Investigation lenses">
        <button id="lensUniverse">Universe</button>
        <button id="lensSpider">Radar</button>
        <button id="lensText">Text</button>
        <button id="lensWorkbench">Workbench</button>
        <button id="lensConductorStudio">Conductor Studio</button>
      </div>
      <div id="universeSearch" class="universe-search" role="search"></div>
      <div id="functionalRadarToggle" class="functional-radar-toggle"></div>
      <div id="guidedInvestigationsToggle" class="guided-investigations-toggle-mount"></div>
      <div id="operationalGrammarLegend" class="ovg-legend" role="region" aria-label="Operational Visual Grammar"></div>
      <div class="spacer"></div>
      <div id="sharedInvestigationState" class="shared-investigation-state" role="region" aria-label="Shared investigation state"></div>
      <div id="returnToUniverseControl" class="return-to-universe" role="navigation" aria-label="Return to Universe"></div>
      <div id="navHistoryRail" class="nav-history-rail" role="navigation" aria-label="Investigation history"></div>
      <label class="slider-control">
        Depth
        <input id="zoom" type="range" min="0" max="7" value="0" step="1" />
        <span id="zoomLabel" class="slider-value">Organization</span>
      </label>
      <label class="slider-control">
        Time
        <input id="time" type="range" min="0" max="3" value="0" step="1" />
      </label>
      <div id="timeTicks" class="time-ticks"></div>
      <div id="timeLabel" class="time-label">Baseline</div>
    </header>
    <main id="mainLayout" class="layout">
      <aside id="leftPanel" class="panel left-panel"></aside>
      <section class="workspace">
        <div id="scopeBar" class="scope-bar"></div>
        <div id="visualLayersBar" class="visual-layers-bar"></div>
        <canvas id="universeCanvas"></canvas>
        <div id="relationshipLegend" class="relationship-legend is-empty"></div>
        <div id="riskBoard" class="risk-board hidden"></div>
        <div id="spiderChart" class="spider-chart hidden"></div>
        <div id="textView" class="text-view-container hidden"></div>
        <div id="workbench" class="workbench hidden"></div>
        <div id="nodeTooltip" class="node-tooltip hidden"></div>
        <div id="hoverPreview" class="hover-preview hidden"></div>
      </section>
      <aside id="jarvisPanel" class="panel jarvis-panel"></aside>
    </main>
    <div id="conductorStudio" class="conductor-studio hidden"></div>
    <div id="scopeExplorer" class="scope-explorer-overlay hidden"></div>
    <div id="visualLayersPanel" class="visual-layers-overlay hidden"></div>
    <div id="functionalRadarPanel" class="functional-radar-overlay hidden"></div>
    <div id="savedViewsManager" class="saved-views-overlay hidden"></div>
    <div id="guidedInvestigationInvitation" class="guided-invitation-mount hidden"></div>
    <div id="scenarioPicker" class="scenario-picker-overlay hidden"></div>
    <div id="guidedInvestigationOverlay" class="guided-investigation-overlay hidden"></div>
  </div>
  <script type="module" src="app.js"></script>
  <script type="module" src="panels/shared-investigation-state.js"></script>
</body>
</html>
