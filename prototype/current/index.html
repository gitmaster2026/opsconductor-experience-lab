<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpsConductor Experience Lab V4</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="brand">OpsConductor <span>Experience Lab V4</span></div>
      <div class="control-group" role="group" aria-label="Workspace lens">
        <button id="lensUniverse" class="active">Universe</button>
        <button id="lensRisk">Risk Board</button>
        <button id="lensSpider">Spider</button>
        <button id="lensText">Text</button>
        <button id="lensWorkbench">Workbench</button>
        <button id="lensConductorStudio">Conductor Studio</button>
      </div>
      <div class="control-group" role="group" aria-label="Left panel">
        <button id="panelDashboard" class="active">Dashboard</button>
        <button id="panelPassport">Passport</button>
      </div>
      <div class="spacer"></div>
      <div id="navHistoryRail" class="nav-history-rail" role="navigation" aria-label="Investigation history"></div>
      <label class="slider-control">
        Depth
        <input id="zoom" type="range" min="0" max="7" value="0" step="1" />
        <span id="zoomLabel" class="slider-value">Organization</span>
      </label>
      <label class="slider-control">
        Time
        <input id="time" type="range" min="0" max="2" value="2" step="1" />
      </label>
      <div id="timeLabel" class="time-label">All recommendations generated</div>
    </header>
    <main id="mainLayout" class="layout">
      <aside id="leftPanel" class="panel left-panel"></aside>
      <section class="workspace">
        <div id="scopeBar" class="scope-bar"></div>
        <canvas id="universeCanvas"></canvas>
        <div id="riskBoard" class="risk-board hidden"></div>
        <div id="spiderChart" class="spider-chart hidden"></div>
        <div id="textView" class="text-view-container hidden"></div>
        <div id="workbench" class="workbench hidden"></div>
        <div id="nodeTooltip" class="node-tooltip hidden"></div>
      </section>
      <aside id="jarvisPanel" class="panel jarvis-panel"></aside>
    </main>
    <div id="conductorStudio" class="conductor-studio hidden"></div>
    <div id="scopeExplorer" class="scope-explorer-overlay hidden"></div>
    <div id="savedViewsManager" class="saved-views-overlay hidden"></div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
